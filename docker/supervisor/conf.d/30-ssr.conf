[program:inertia-ssr]
command     = php /var/www/html/artisan inertia:start-ssr
directory   = /var/www/html
user        = www-data
priority    = 30
autostart   = true
autorestart = true
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
