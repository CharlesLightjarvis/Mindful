[www]
user  = www-data
group = www-data

; Listen on TCP (nginx runs in the same container)
listen               = 127.0.0.1:9000
listen.allowed_clients = 127.0.0.1

; Dynamic process management
; Adjust pm.max_children based on available RAM:
; Rule of thumb: (total RAM - system overhead) / ~50MB per worker
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Route logs to Docker stdout/stderr
php_admin_value[error_log]  = /proc/1/fd/2
php_admin_flag[log_errors]  = on
access.log = /dev/null

; Security
php_flag[expose_php] = off
