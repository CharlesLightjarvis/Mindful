server {
    listen 80 default_server;
    server_name _;

    root  /var/www/html/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                always;
    add_header X-Content-Type-Options    "nosniff"                   always;
    add_header X-XSS-Protection          "1; mode=block"             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Inertia SSR requires larger FastCGI buffers
    fastcgi_buffer_size    32k;
    fastcgi_buffers        8 16k;
    fastcgi_read_timeout   300;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Deny access to hidden files (except .well-known for Let's Encrypt)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Suppress logs for common browser requests
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Long-lived cache for Vite-hashed assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ \.php$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_hide_header     X-Powered-By;
        include                 fastcgi_params;
    }
}
